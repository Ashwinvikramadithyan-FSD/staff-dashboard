{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Update {{ asset.name }} - Edit Asset</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Playfair Display', serif;
}

body{
    background:#050505;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 16px;
}

.container{
    width:100%;
    max-width:640px;
}

.card{
    background:rgba(255,252,240,0.92);
    border:1.5px solid rgba(200,185,145,0.45);
    border-radius:18px;
    padding:36px;
    box-shadow:0 2px 20px rgba(180,160,100,0.18);
}

.card h2{
    text-align:center;
    font-size:1.6rem;
    font-weight:600;
    color:#1e1810;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    font-style:italic;
    color:#1e1810;
    font-size:0.92rem;
}

input[type="text"],
textarea{
    width:100%;
    padding:12px 16px;
    border:1.5px solid rgba(180,160,100,0.4);
    border-radius:10px;
    font-size:0.95rem;
    font-family:inherit;
    background:rgba(255,255,255,0.85);
    color:#2c2416;
    outline:none;
    transition:.2s;
}

input[type="text"]:focus,
textarea:focus{
    border-color:#7ec8e3;
}

textarea{
    resize:vertical;
    min-height:120px;
}

.current-image{
    display:block;
    width:180px;
    height:180px;
    object-fit:contain;
    margin:0 auto 22px;
    border:1.5px solid rgba(200,185,145,0.45);
    border-radius:12px;
    background:#ffffff;
}

input[type="file"]{
    width:100%;
    padding:10px;
    border:1.5px dashed rgba(180,160,100,0.4);
    border-radius:10px;
    background:rgba(255,255,255,0.6);
    font-size:0.88rem;
    color:#3a2e1a;
    cursor:pointer;
}

.buttons{
    display:flex;
    gap:14px;
    margin-top:30px;
}

.buttons button,
.buttons a{
    flex:1;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
    text-decoration:none;
    padding:12px 20px;
    border-radius:50px;
    font-weight:600;
    font-style:italic;
    font-size:0.92rem;
    font-family:inherit;
    border:none;
    cursor:pointer;
    transition:transform .15s, opacity .2s;
}

.buttons button:hover,
.buttons a:hover{
    transform:translateY(-1px);
    opacity:.88;
}

.save-btn{
    background:linear-gradient(135deg,#a8d8e8,#7ec8e3);
    color:#0d3d52;
}

.cancel-btn{
    background:rgba(255,255,255,0.7);
    color:#2c2416;
    border:1.5px solid rgba(180,160,100,0.35) !important;
}

@media(max-width:480px){

    .card{
        padding:24px 20px;
    }

    .buttons{
        flex-direction:column;
    }

}

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2>
            <i class="fa-solid fa-pen"></i>
            Update Asset
        </h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-group">
                <label>Asset Name</label>
                <input
                    type="text"
                    name="name"
                    value="{{ asset.name }}"
                    required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description">{{ asset.description }}</textarea>
            </div>

            {% if asset.image %}
            <img class="current-image"
                 src="{{ asset.image.url }}"
                 alt="{{ asset.name }}">
            {% endif %}

            <div class="form-group">
                <label>Change Image</label>
                <input
                    type="file"
                    name="image">
            </div>

            <div class="buttons">

                <button type="submit" class="save-btn">
                    <i class="fa-solid fa-check"></i>
                    Save Changes
                </button>

                <a href="{% url 'asset_detail' asset.id %}" class="cancel-btn">
                    <i class="fa-solid fa-xmark"></i>
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
