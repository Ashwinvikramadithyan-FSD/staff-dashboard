{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Request Asset</title>

    <link rel="stylesheet" href="{% static 'css/request_asset.css' %}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Request an Asset</h1>

        <p class="subtitle">
            Fill in the details below to submit your asset request.
        </p>

        <form method="POST">

            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="error-box">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <div class="field">
                <label>Asset</label>
                {{ form.asset }}
                {{ form.asset.errors }}
            </div>

            <div class="field">
                <label>Reason</label>
                {{ form.reason }}
                {{ form.reason.errors }}
            </div>

            <button type="submit" class="submit-btn">
                Submit Request
            </button>

        </form>

    </div>

</div>

</body>
</html>
